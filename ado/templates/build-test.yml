name: build-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  dotnetVersion: '10.0.x'
  buildConfiguration: 'Release'
  solutionPath: 'Orion.Aspire.Starter.slnx'

steps:
  - checkout: self

  - task: UseDotNet@2
    displayName: 'Setup .NET'
    inputs:
      packageType: 'sdk'
      version: '$(dotnetVersion)'

  - script: dotnet restore $(solutionPath)
    displayName: 'Restore'

  - script: dotnet build $(solutionPath) --configuration $(buildConfiguration) --no-restore
    displayName: 'Build'

  - script: dotnet test $(solutionPath) --configuration $(buildConfiguration) --no-build
    displayName: 'Test'